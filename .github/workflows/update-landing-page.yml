name: Update landing page updated

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 8:15 AM Melbourne time during AEST, 9:15 AM during AEDT.
    # GitHub Actions cron is UTC.
    - cron: "0 0 1 * *"

permissions:
  contents: write

jobs:
  update-landing-page:
    runs-on: ubuntu-latest

    steps:
      - name: Check out landing page repository
        uses: actions/checkout@v4

      - name: Generate landing page from PMacDaSci repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Replace this with the final Peter Mac Connect URL.
          CONNECT_PAGE_URL: "https://petermacvic.sharepoint.com/sites/connect-research/SitePages/Informatics-Consulting.aspx"
        run: python scripts/generate_landing_page.py

      - name: Commit generated landing page if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update training landing page"
          git push
